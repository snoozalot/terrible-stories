<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Write Terrible Stories</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=IM+Fell+DW+Pica:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal: #5a9e8f;
    --deep-teal: #2d5c52;
    --sand: #c4a97d;
    --dark: #1a1a2e;
    --cream: #f0e8d8;
    --muted-green: #4a7c59;
    --pixel: 'Press Start 2P', monospace;
    --serif: 'IM Fell DW Pica', serif;
  }

  body {
    background: #0d0d1a;
    color: var(--cream);
    font-family: var(--serif);
    min-height: 100vh;
    overflow-x: hidden;
    image-rendering: pixelated;
  }

  /* ── PIXEL SCENE CANVAS ── */
  #scene-canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    image-rendering: pixelated;
    transition: opacity 0.3s;
  }

  /* ── DITHER OVERLAY ── */
  #dither {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.15) 0px,
      rgba(0,0,0,0.15) 1px,
      transparent 1px,
      transparent 2px
    ),
    repeating-linear-gradient(
      90deg,
      rgba(0,0,0,0.08) 0px,
      rgba(0,0,0,0.08) 1px,
      transparent 1px,
      transparent 2px
    );
    transition: opacity 0.4s;
  }
  #dither.flash { opacity: 1; }

  /* ── MAIN LAYOUT ── */
  #app {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 2rem 1rem 6rem;
  }

  /* ── TITLE ── */
  #title-block {
    text-align: center;
    margin-bottom: 2.5rem;
    margin-top: 1.5rem;
  }
  #title-block h1 {
    font-family: var(--serif);
    font-style: italic;
    font-size: clamp(1.2rem, 4vw, 2rem);
    color: var(--cream);
    text-shadow: 2px 2px 0 #000, 0 0 20px rgba(90,158,143,0.4);
    letter-spacing: 0.02em;
    margin-bottom: 0.4rem;
  }
  #title-block p {
    font-family: var(--pixel);
    font-size: 0.45rem;
    color: rgba(240,232,216,0.45);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ── NAV BUTTONS ── */
  #nav {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    justify-content: center;
    margin-bottom: 2.5rem;
    max-width: 700px;
  }

  .loc-btn {
    font-family: var(--pixel);
    font-size: 0.5rem;
    padding: 0.6rem 1rem;
    border: 2px solid rgba(240,232,216,0.3);
    background: rgba(13,13,26,0.7);
    color: rgba(240,232,216,0.7);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    transition: all 0.15s;
    position: relative;
    image-rendering: pixelated;
  }
  .loc-btn::before {
    content: '';
    position: absolute;
    inset: -2px;
    border: 2px solid transparent;
    transition: border-color 0.15s;
  }
  .loc-btn:hover, .loc-btn.active {
    background: rgba(90,158,143,0.25);
    border-color: var(--teal);
    color: var(--cream);
    box-shadow: 0 0 12px rgba(90,158,143,0.35), inset 0 0 8px rgba(90,158,143,0.1);
  }
  .loc-btn.active {
    color: #fff;
  }

  /* ── POEM PANEL ── */
  #poem-panel {
    max-width: 620px;
    width: 100%;
    background: rgba(10,10,20,0.75);
    border: 1px solid rgba(90,158,143,0.25);
    padding: 2rem 2.2rem;
    backdrop-filter: blur(2px);
    position: relative;
  }
  #poem-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--teal), transparent);
  }

  #location-label {
    font-family: var(--pixel);
    font-size: 0.45rem;
    color: var(--teal);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 1.4rem;
    opacity: 0;
    transition: opacity 0.5s 0.2s;
  }
  #location-label.visible { opacity: 1; }

  #poem-lines {
    font-family: var(--serif);
    font-size: clamp(0.95rem, 2.2vw, 1.15rem);
    line-height: 1.85;
    color: var(--cream);
    min-height: 200px;
  }

  .poem-line {
    display: block;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.4s, transform 0.4s;
  }
  .poem-line.show {
    opacity: 1;
    transform: none;
  }
  .poem-line.italic { font-style: italic; }
  .poem-line.indent { margin-left: 1.5rem; }
  .poem-line.blank { height: 0.7em; }

  /* ── DEER SPRITE ── */
  #deer {
    position: fixed;
    bottom: 18px;
    left: -80px;
    z-index: 3;
    pointer-events: none;
    transition: bottom 0.5s;
  }
  #deer canvas {
    image-rendering: pixelated;
    width: 64px;
    height: 64px;
  }

  /* ── INTRO STATE ── */
  #intro {
    font-family: var(--serif);
    font-style: italic;
    font-size: clamp(0.95rem, 2vw, 1.1rem);
    color: rgba(240,232,216,0.55);
    text-align: center;
    line-height: 1.8;
    max-width: 420px;
    padding: 3rem 1rem;
  }
  #intro span {
    font-family: var(--pixel);
    font-size: 0.4rem;
    display: block;
    margin-top: 1.5rem;
    color: rgba(90,158,143,0.6);
    letter-spacing: 0.12em;
  }

  /* scanline */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 100;
  }
</style>
</head>
<body>

<canvas id="scene-canvas"></canvas>
<div id="dither"></div>

<div id="app">
  <div id="title-block">
    <h1>i write terrible stories</h1>
    <p>a poem &nbsp;·&nbsp; 🦌</p>
  </div>

  <nav id="nav">
    <button class="loc-btn" data-loc="kitchen">Kitchen</button>
    <button class="loc-btn" data-loc="hotel">Hotel</button>
    <button class="loc-btn" data-loc="lake">The Lake</button>
    <button class="loc-btn" data-loc="highway">Highway</button>
    <button class="loc-btn" data-loc="hospital">Hospital</button>
  </nav>

  <div id="poem-panel">
    <div id="location-label"></div>
    <div id="poem-lines">
      <div id="intro">
        another morning —<br>faulty or lovely?
        <span>choose a place to enter ↑</span>
      </div>
    </div>
  </div>
</div>

<!-- Deer -->
<div id="deer"><canvas id="deer-canvas" width="32" height="32"></canvas></div>

<script>
// ── POEM CONTENT ──
const poems = {
  kitchen: {
    label: '// kitchen light',
    lines: [
      { t: 'Another morning' },
      { t: 'you\'d call this faulty' },
      { t: '', blank: true },
      { t: 'Another morning, but your mother is cooking' },
      { t: 'in the kitchen with the light on' },
      { t: '', blank: true },
      { t: 'Faulty or lovely ?', italic: true },
      { t: 'Lovely or faulty ?', italic: true },
      { t: '', blank: true },
      { t: 'Hold on,' },
      { t: 'I can\'t remember' },
      { t: '', blank: true },
      { t: 'Another morning, and the rain' },
      { t: 'is everywhere' },
      { t: 'and the kitchen light is' },
      { t: 'still going' },
      { t: 'and you don\'t care about that' },
      { t: 'You never did' },
    ]
  },
  lake: {
    label: '// the lake',
    lines: [
      { t: 'A lake ?' },
      { t: 'No, a river.' },
      { t: '', blank: true },
      { t: 'Water rustling below, trees rustling above,' },
      { t: 'someone with roots, somewhere to go' },
      { t: '', blank: true },
      { t: 'No, a lake' },
      { t: 'A lake and its clean, shimmering water' },
      { t: 'And a birdsong that you can\'t get out of your head' },
      { t: '', blank: true },
      { t: 'A lake, a lake, not a river, a lake.' },
      { t: '', blank: true },
      { t: 'Sometimes I can\'t tell if you are real', italic: true },
      { t: 'I walk through my past and create dreams', italic: true },
      { t: 'And write them down', italic: true },
      { t: '', blank: true },
      { t: 'Is that a deer by the lake?' },
      { t: 'The deer trots around the lake' },
      { t: 'Its divine, silvery,' },
      { t: 'A memory' },
      { t: 'A telling' },
    ]
  },
  hotel: {
    label: '// the hotel',
    lines: [
      { t: 'Why do you love them so much, you ask' },
      { t: 'Hotels ?' },
      { t: '', blank: true },
      { t: 'I can\'t remember telling you this about me' },
      { t: '', blank: true },
      { t: 'No past, I say.', italic: true },
      { t: 'No past, only present,', italic: true },
      { t: 'a clean, infinite present', italic: true },
      { t: '', blank: true },
      { t: 'Weird noise of the AC,' },
      { t: 'strangers talking in the hall' },
      { t: 'Nothing waiting for you in the closet' },
      { t: '', blank: true },
      { t: 'I am sorry I told you my name' },
      { t: 'and came to your house' },
      { t: 'I am sorry you know me so well' },
      { t: '', blank: true },
      { t: 'I can\'t remember telling you this about me' },
    ]
  },
  hospital: {
    label: '// the hospital',
    lines: [
      { t: 'A hospital then, but I am not there' },
      { t: '', blank: true },
      { t: 'To pace its sterile corridors' },
      { t: 'And stare at my hands' },
      { t: 'To stand under its unnatural light' },
      { t: 'And wait' },
      { t: 'And look at my feet' },
      { t: 'And wait' },
      { t: '', blank: true },
      { t: 'Sorry, my love, someone says', italic: true },
      { t: 'Over and over again', italic: true },
      { t: 'Sorry, my love,', italic: true },
      { t: 'I am so sorry', italic: true },
      { t: '', blank: true },
      { t: 'I\'m sorry, my love, did you want a better ending ?' },
      { t: '', blank: true },
      { t: 'Shall I take you to a creek in the middle of nowhere ?' },
      { t: 'A beach, warm and sunny ?' },
      { t: 'A waterfall ?' },
    ]
  },
  highway: {
    label: '// highway / deer',
    lines: [
      { t: 'Is that you in my car ?' },
      { t: 'Pitch black darkness' },
      { t: 'And a splitting white light' },
      { t: '', blank: true },
      { t: 'Or are you outside the bakery that I love ?' },
      { t: '', blank: true },
      { t: 'You think I am lying' },
      { t: 'But I walk and walk and' },
      { t: 'Can\'t find you' },
      { t: '', blank: true },
      { t: 'But there is a deer by the water' },
      { t: '', blank: true },
      { t: 'This isn\'t real, you say. It can\'t be', italic: true },
      { t: '', blank: true },
      { t: 'Maybe it isn\'t' },
      { t: 'Maybe the deer is my invention' },
      { t: 'Maybe it is me, but you won\'t' },
      { t: 'like it, so I let it go' },
      { t: '', blank: true },
      { t: 'Is the deer looking at you ?' },
    ]
  }
};

// ── PIXEL SCENES ──
const canvas = document.getElementById('scene-canvas');
const ctx = canvas.getContext('2d');
const PIXEL = 4;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); if (currentScene) drawScene(currentScene); });

function px(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x * PIXEL, y * PIXEL, w * PIXEL, h * PIXEL);
}

function drawScene(name) {
  const W = Math.ceil(canvas.width / PIXEL);
  const H = Math.ceil(canvas.height / PIXEL);

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (name === 'kitchen') drawKitchen(W, H);
  else if (name === 'lake') drawLake(W, H);
  else if (name === 'hotel') drawHotel(W, H);
  else if (name === 'hospital') drawHospital(W, H);
  else if (name === 'highway') drawHighway(W, H);
  else drawDefault(W, H);
}

function drawDefault(W, H) {
  for (let y = 0; y < H; y++) {
    const t = y / H;
    ctx.fillStyle = `rgb(${Math.floor(10+t*8)},${Math.floor(10+t*6)},${Math.floor(22+t*18)})`;
    ctx.fillRect(0, y * PIXEL, canvas.width, PIXEL);
  }
  // subtle stars
  for (let i = 0; i < 120; i++) {
    const sx = Math.floor(Math.random() * W);
    const sy = Math.floor(Math.random() * H * 0.7);
    ctx.fillStyle = `rgba(200,210,255,${0.2 + Math.random()*0.5})`;
    ctx.fillRect(sx*PIXEL, sy*PIXEL, PIXEL, PIXEL);
  }
}

function drawKitchen(W, H) {
  // === WALLS — original dark blue-black top → warm amber bottom ===
  for (let y = 0; y < H; y++) {
    const t = y / H;
    const r = Math.floor(8  + t * 28);
    const g = Math.floor(7  + t * 16);
    const b = Math.floor(18 + t * 8);
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(0, y * PIXEL, canvas.width, PIXEL);
  }

  const floorY = Math.floor(H * 0.70);
  const cy     = Math.floor(H * 0.58); // counter top

  // === FLOOR — dark warm wood planks (no checker) ===
  for (let x = 0; x < W; x++) {
    for (let y = floorY; y < H; y++) {
      const plank = Math.floor(x / 6) % 3;
      const shade = plank === 0 ? '#2a1a08' : plank === 1 ? '#221408' : '#2e1e0c';
      ctx.fillStyle = shade;
      ctx.fillRect(x * PIXEL, y * PIXEL, PIXEL, PIXEL);
    }
  }
  // plank dividers
  ctx.fillStyle = 'rgba(10,6,2,0.5)';
  for (let x = 6; x < W; x += 6) {
    ctx.fillRect(x * PIXEL, floorY * PIXEL, PIXEL, (H - floorY) * PIXEL);
  }
  ctx.fillStyle = '#3a2a14';
  ctx.fillRect(0, floorY * PIXEL, canvas.width, PIXEL);

  // === LOWER CABINETS (counter body) ===
  ctx.fillStyle = '#1e1208';
  ctx.fillRect(0, (cy + 3) * PIXEL, canvas.width, (floorY - cy - 3) * PIXEL);
  // lower cabinet door panels
  for (let x = 2; x < W; x += 12) {
    ctx.fillStyle = '#2a1a0a';
    ctx.fillRect(x * PIXEL, (cy + 4) * PIXEL, 10 * PIXEL, (floorY - cy - 6) * PIXEL);
    ctx.fillStyle = '#160e04';
    ctx.fillRect((x + 1) * PIXEL, (cy + 5) * PIXEL, 8 * PIXEL, (floorY - cy - 8) * PIXEL);
    // knob
    ctx.fillStyle = '#7a5228';
    ctx.fillRect((x + 4) * PIXEL, (cy + Math.floor((floorY - cy) * 0.45)) * PIXEL, 2 * PIXEL, 2 * PIXEL);
    ctx.fillStyle = '#a07038';
    ctx.fillRect((x + 4) * PIXEL, (cy + Math.floor((floorY - cy) * 0.45)) * PIXEL, PIXEL, PIXEL);
  }

  // === COUNTER TOP — dark stone ===
  ctx.fillStyle = '#3a2a14';
  ctx.fillRect(0, cy * PIXEL, canvas.width, 3 * PIXEL);
  ctx.fillStyle = '#4e3a1e'; // top highlight edge
  ctx.fillRect(0, cy * PIXEL, canvas.width, PIXEL);
  ctx.fillStyle = '#221408'; // bottom shadow edge
  ctx.fillRect(0, (cy + 3) * PIXEL, canvas.width, PIXEL);

  // === UPPER CABINETS ===
  const cabY = Math.floor(H * 0.30);
  const cabH = Math.floor(H * 0.14);
  ctx.fillStyle = '#1a1006';
  ctx.fillRect(0, cabY * PIXEL, canvas.width, cabH * PIXEL);
  for (let x = 2; x < W; x += 12) {
    ctx.fillStyle = '#261808';
    ctx.fillRect(x * PIXEL, (cabY + 1) * PIXEL, 10 * PIXEL, (cabH - 2) * PIXEL);
    ctx.fillStyle = '#160e04';
    ctx.fillRect((x + 1) * PIXEL, (cabY + 2) * PIXEL, 8 * PIXEL, (cabH - 4) * PIXEL);
    // inner highlight
    ctx.fillStyle = '#2e1e0a';
    ctx.fillRect((x + 1) * PIXEL, (cabY + 2) * PIXEL, 8 * PIXEL, PIXEL);
    // knob
    ctx.fillStyle = '#7a5228';
    ctx.fillRect((x + 4) * PIXEL, (cabY + Math.floor(cabH / 2)) * PIXEL, 2 * PIXEL, 2 * PIXEL);
    ctx.fillStyle = '#a07038';
    ctx.fillRect((x + 4) * PIXEL, (cabY + Math.floor(cabH / 2)) * PIXEL, PIXEL, PIXEL);
  }
  // cabinet edges
  ctx.fillStyle = '#3a2810';
  ctx.fillRect(0, cabY * PIXEL, canvas.width, PIXEL);
  ctx.fillRect(0, (cabY + cabH - 1) * PIXEL, canvas.width, 2 * PIXEL);
  // under-cabinet shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(0, (cabY + cabH + 1) * PIXEL, canvas.width, 3 * PIXEL);

  // === WINDOW — centred, night sky outside, warm glow inside ===
  const wx = Math.floor(W * 0.38), wy = Math.floor(H * 0.04);
  const ww = Math.floor(W * 0.24), wh = cabY - wy - 1;

  // wall glow around window
  const wGlow = ctx.createRadialGradient(
    (wx + ww / 2) * PIXEL, (wy + wh / 2) * PIXEL, PIXEL,
    (wx + ww / 2) * PIXEL, (wy + wh / 2) * PIXEL, ww * PIXEL
  );
  wGlow.addColorStop(0, 'rgba(255,210,90,0.2)');
  wGlow.addColorStop(1, 'rgba(255,170,50,0)');
  ctx.fillStyle = wGlow;
  ctx.fillRect((wx - 8) * PIXEL, 0, (ww + 16) * PIXEL, (wh + 10) * PIXEL);

  // frame
  ctx.fillStyle = '#3e2810';
  ctx.fillRect(wx * PIXEL, wy * PIXEL, ww * PIXEL, wh * PIXEL);
  // pane — deep night blue outside
  const halfW = Math.floor(ww / 2);
  ctx.fillStyle = '#0a0e1e';
  ctx.fillRect((wx + 1) * PIXEL, (wy + 1) * PIXEL, (halfW - 1) * PIXEL, (wh - 2) * PIXEL);
  ctx.fillRect((wx + halfW + 1) * PIXEL, (wy + 1) * PIXEL, (ww - halfW - 2) * PIXEL, (wh - 2) * PIXEL);
  // stars in window
  for (let i = 0; i < 18; i++) {
    const sx = wx + 1 + Math.floor(Math.random() * (ww - 2));
    const sy = wy + 1 + Math.floor(Math.random() * (wh - 2));
    ctx.fillStyle = `rgba(200,210,255,${0.3 + Math.random() * 0.5})`;
    ctx.fillRect(sx * PIXEL, sy * PIXEL, PIXEL, PIXEL);
  }
  // rain streaks on glass
  for (let i = 0; i < 10; i++) {
    const rx = wx + 1 + Math.floor(Math.random() * (ww - 2));
    const ry = wy + 1 + Math.floor(Math.random() * (wh - 3));
    ctx.fillStyle = 'rgba(120,140,200,0.2)';
    ctx.fillRect(rx * PIXEL, ry * PIXEL, PIXEL, 2 * PIXEL);
  }
  // cross bars
  ctx.fillStyle = '#3e2810';
  ctx.fillRect(wx * PIXEL, (wy + Math.floor(wh / 2)) * PIXEL, ww * PIXEL, 2 * PIXEL);
  ctx.fillRect((wx + halfW) * PIXEL, wy * PIXEL, 2 * PIXEL, wh * PIXEL);
  // sill
  ctx.fillStyle = '#4a3018';
  ctx.fillRect((wx - 1) * PIXEL, (wy + wh) * PIXEL, (ww + 2) * PIXEL, 2 * PIXEL);

  // === CAT on window sill — proper sitting silhouette ===
  // Placed just inside the right pane, facing left (toward the room)
  const catX = wx + Math.floor(ww * 0.58);
  const catSillY = wy + wh; // sill top
  // cat sits ON the sill so base of body = sillY
  // 16-row pixel cat (each unit = 1 PIXEL):
  // Row offsets from sill upward
  const C = catX, S = catSillY;
  ctx.fillStyle = '#0c0806';
  // ── TAIL: curls out left along sill then up ──
  ctx.fillRect((C - 4)*PIXEL, (S - 1)*PIXEL, 4*PIXEL, PIXEL); // tail base going left
  ctx.fillRect((C - 5)*PIXEL, (S - 3)*PIXEL, PIXEL, 2*PIXEL); // tail curves up
  ctx.fillRect((C - 4)*PIXEL, (S - 4)*PIXEL, PIXEL, PIXEL);   // tail tip
  // ── BODY: chunky oval, 5 wide 4 tall ──
  ctx.fillRect((C - 1)*PIXEL, (S - 5)*PIXEL, 5*PIXEL, PIXEL); // body top
  ctx.fillRect((C - 2)*PIXEL, (S - 4)*PIXEL, 7*PIXEL, PIXEL);
  ctx.fillRect((C - 2)*PIXEL, (S - 3)*PIXEL, 7*PIXEL, PIXEL);
  ctx.fillRect((C - 1)*PIXEL, (S - 2)*PIXEL, 5*PIXEL, PIXEL); // body bottom
  // ── FRONT PAWS on sill ──
  ctx.fillRect((C - 1)*PIXEL, (S - 1)*PIXEL, 2*PIXEL, PIXEL);
  ctx.fillRect((C + 2)*PIXEL, (S - 1)*PIXEL, 2*PIXEL, PIXEL);
  // ── NECK ──
  ctx.fillRect(C*PIXEL,       (S - 7)*PIXEL, 3*PIXEL, 2*PIXEL);
  // ── HEAD: 4 wide 3 tall ──
  ctx.fillRect((C - 1)*PIXEL, (S - 10)*PIXEL, 5*PIXEL, PIXEL); // head top
  ctx.fillRect((C - 1)*PIXEL, (S -  9)*PIXEL, 5*PIXEL, PIXEL);
  ctx.fillRect((C - 1)*PIXEL, (S -  8)*PIXEL, 5*PIXEL, PIXEL); // chin
  // ── EARS: two sharp triangles ──
  ctx.fillRect((C - 1)*PIXEL, (S - 12)*PIXEL, 2*PIXEL, 2*PIXEL); // left ear
  ctx.fillRect((C + 3)*PIXEL, (S - 12)*PIXEL, 2*PIXEL, 2*PIXEL); // right ear
  ctx.fillRect(C*PIXEL,       (S - 13)*PIXEL, PIXEL,   PIXEL);   // left ear tip
  ctx.fillRect((C + 4)*PIXEL, (S - 13)*PIXEL, PIXEL,   PIXEL);   // right ear tip
  // ── FACE: nose + eyes glow ──
  // eyes — bright amber slits
  ctx.fillStyle = '#e8a020';
  ctx.fillRect(C*PIXEL,       (S - 9)*PIXEL, PIXEL, PIXEL); // left eye
  ctx.fillRect((C + 3)*PIXEL, (S - 9)*PIXEL, PIXEL, PIXEL); // right eye
  // eye glow
  ctx.fillStyle = 'rgba(232,160,32,0.3)';
  ctx.fillRect((C - 1)*PIXEL, (S - 10)*PIXEL, 3*PIXEL, 3*PIXEL);
  ctx.fillRect((C + 2)*PIXEL, (S - 10)*PIXEL, 3*PIXEL, 3*PIXEL);
  // nose
  ctx.fillStyle = '#5a2818';
  ctx.fillRect((C + 1)*PIXEL, (S - 8)*PIXEL, 2*PIXEL, PIXEL);
  // whiskers — thin lines using 1px fills
  ctx.fillStyle = 'rgba(180,160,120,0.4)';
  ctx.fillRect((C - 3)*PIXEL, (S - 8)*PIXEL, 3*PIXEL, PIXEL); // left whiskers
  ctx.fillRect((C + 4)*PIXEL, (S - 8)*PIXEL, 3*PIXEL, PIXEL); // right whiskers

  // === OPEN FRIDGE — far left, yellow light spilling out ===
  const frx = Math.floor(W * 0.02), fry = Math.floor(H * 0.30);
  const frw = Math.floor(W * 0.13), frh = floorY - fry;

  // fridge glow onto wall and floor
  const fGlow = ctx.createRadialGradient(
    (frx + frw + 1) * PIXEL, (fry + Math.floor(frh * 0.4)) * PIXEL, 0,
    (frx + frw + 1) * PIXEL, (fry + Math.floor(frh * 0.4)) * PIXEL, frw * 2.5 * PIXEL
  );
  fGlow.addColorStop(0,   'rgba(255,220,80,0.38)');
  fGlow.addColorStop(0.4, 'rgba(255,200,60,0.16)');
  fGlow.addColorStop(1,   'rgba(255,180,40,0)');
  ctx.fillStyle = fGlow;
  ctx.fillRect(0, (fry - 4) * PIXEL, (frx + frw * 3) * PIXEL, (frh + 8) * PIXEL);

  // fridge body
  ctx.fillStyle = '#2a2218';
  ctx.fillRect(frx * PIXEL, fry * PIXEL, frw * PIXEL, frh * PIXEL);
  // fridge top edge
  ctx.fillStyle = '#3a3028';
  ctx.fillRect(frx * PIXEL, fry * PIXEL, frw * PIXEL, PIXEL);

  // interior — warm yellow light
  const intH = Math.floor(frh * 0.62);
  const intGrd = ctx.createLinearGradient(0, fry * PIXEL, 0, (fry + intH) * PIXEL);
  intGrd.addColorStop(0, 'rgba(255,240,150,0.95)');
  intGrd.addColorStop(1, 'rgba(255,200,70,0.6)');
  ctx.fillStyle = intGrd;
  ctx.fillRect((frx + 1) * PIXEL, (fry + 1) * PIXEL, (frw - 2) * PIXEL, intH * PIXEL);

  // shelves
  ctx.fillStyle = 'rgba(120,90,40,0.5)';
  ctx.fillRect((frx + 1) * PIXEL, (fry + Math.floor(frh * 0.22)) * PIXEL, (frw - 2) * PIXEL, PIXEL);
  ctx.fillRect((frx + 1) * PIXEL, (fry + Math.floor(frh * 0.42)) * PIXEL, (frw - 2) * PIXEL, PIXEL);

  // items: milk, OJ, jar, leftovers
  ctx.fillStyle = '#e0d8c8'; ctx.fillRect((frx+2)*PIXEL, (fry+2)*PIXEL, 2*PIXEL, 5*PIXEL); // milk
  ctx.fillStyle = '#c8d0b8'; ctx.fillRect((frx+2)*PIXEL, (fry+1)*PIXEL, 2*PIXEL, PIXEL);   // lid
  ctx.fillStyle = '#c06010'; ctx.fillRect((frx+5)*PIXEL, (fry+2)*PIXEL, 2*PIXEL, 4*PIXEL); // OJ
  ctx.fillStyle = '#486830'; ctx.fillRect((frx+8)*PIXEL, (fry+3)*PIXEL, 2*PIXEL, 3*PIXEL); // jar
  ctx.fillStyle = '#b0902a'; ctx.fillRect((frx+2)*PIXEL, (fry+Math.floor(frh*0.44))*PIXEL, 5*PIXEL, 2*PIXEL); // egg

  // freezer
  ctx.fillStyle = '#1a1e28';
  ctx.fillRect((frx+1)*PIXEL, (fry+Math.floor(frh*0.64))*PIXEL, (frw-2)*PIXEL, Math.floor(frh*0.34)*PIXEL);
  ctx.fillStyle = 'rgba(80,90,120,0.25)';
  ctx.fillRect((frx+1)*PIXEL, (fry+Math.floor(frh*0.64))*PIXEL, (frw-2)*PIXEL, PIXEL);

  // open door (swung left, edge visible)
  ctx.fillStyle = '#222018';
  ctx.fillRect((frx - 3) * PIXEL, fry * PIXEL, 3 * PIXEL, frh * PIXEL);
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.fillRect((frx - 3) * PIXEL, fry * PIXEL, PIXEL, frh * PIXEL);
  // handle
  ctx.fillStyle = '#484038';
  ctx.fillRect((frx - 1) * PIXEL, (fry + Math.floor(frh * 0.32)) * PIXEL, PIXEL, 3 * PIXEL);

  // === KITCHEN OBJECTS on counter ===

  // Kettle — dark, left of centre
  const kx = Math.floor(W * 0.44), ky = cy - 7;
  ctx.fillStyle = '#1c1208';
  ctx.fillRect(kx*PIXEL,       (ky+2)*PIXEL, 6*PIXEL, 5*PIXEL); // body
  ctx.fillRect((kx+1)*PIXEL,    ky*PIXEL,    4*PIXEL, 3*PIXEL); // domed top
  ctx.fillRect((kx+6)*PIXEL,   (ky+2)*PIXEL, 3*PIXEL, 2*PIXEL); // spout
  ctx.fillRect((kx-2)*PIXEL,   (ky+2)*PIXEL, 2*PIXEL, 3*PIXEL); // handle
  ctx.fillStyle = '#2e1e10'; // highlight
  ctx.fillRect(kx*PIXEL, (ky+2)*PIXEL, PIXEL, 5*PIXEL);
  // lid knob
  ctx.fillStyle = '#5a3818';
  ctx.fillRect((kx+2)*PIXEL, (ky-1)*PIXEL, 2*PIXEL, PIXEL);

  // Mug — next to kettle
  const mx = Math.floor(W * 0.56), my = cy - 5;
  ctx.fillStyle = '#3a2010';
  ctx.fillRect(mx*PIXEL,     my*PIXEL,    4*PIXEL, 4*PIXEL);
  ctx.fillStyle = '#4e2e18';
  ctx.fillRect(mx*PIXEL,     my*PIXEL,    4*PIXEL, PIXEL); // rim
  ctx.fillStyle = '#281408';
  ctx.fillRect((mx+4)*PIXEL, (my+1)*PIXEL, 2*PIXEL, 2*PIXEL); // handle
  // hot drink inside
  ctx.fillStyle = '#6a3010';
  ctx.fillRect((mx+1)*PIXEL, (my+1)*PIXEL, 2*PIXEL, 2*PIXEL);
  // steam
  ctx.fillStyle = 'rgba(255,220,160,0.18)';
  ctx.fillRect((mx+1)*PIXEL, (my-2)*PIXEL, PIXEL, 2*PIXEL);
  ctx.fillRect((mx+2)*PIXEL, (my-3)*PIXEL, PIXEL, 3*PIXEL);
  ctx.fillRect((mx+3)*PIXEL, (my-2)*PIXEL, PIXEL, 2*PIXEL);

  // Cutting board + items
  const cbx = Math.floor(W * 0.64), cby = cy - 3;
  ctx.fillStyle = '#3a2010';
  ctx.fillRect(cbx*PIXEL, cby*PIXEL, 9*PIXEL, 3*PIXEL);
  ctx.fillStyle = '#4a2e18';
  ctx.fillRect(cbx*PIXEL, cby*PIXEL, 9*PIXEL, PIXEL);
  // knife on board
  ctx.fillStyle = '#c8c0b0';
  ctx.fillRect((cbx+1)*PIXEL, (cby-1)*PIXEL, 6*PIXEL, PIXEL);
  ctx.fillStyle = '#2e1a08';
  ctx.fillRect((cbx+6)*PIXEL, (cby-1)*PIXEL, 2*PIXEL, PIXEL); // handle

  // Teapot — right side
  const tx = Math.floor(W * 0.76), ty = cy - 7;
  ctx.fillStyle = '#2a1808';
  ctx.fillRect(tx*PIXEL,     (ty+2)*PIXEL, 7*PIXEL, 5*PIXEL);
  ctx.fillRect((tx+1)*PIXEL,  ty*PIXEL,    5*PIXEL, 3*PIXEL);
  ctx.fillRect((tx+7)*PIXEL, (ty+3)*PIXEL, 3*PIXEL, 2*PIXEL); // spout
  ctx.fillRect((tx-2)*PIXEL, (ty+2)*PIXEL, 2*PIXEL, 3*PIXEL); // handle
  ctx.fillStyle = '#3e2410';
  ctx.fillRect(tx*PIXEL, (ty+2)*PIXEL, PIXEL, 5*PIXEL);
  // lid
  ctx.fillStyle = '#1c1006';
  ctx.fillRect((tx+2)*PIXEL, (ty-1)*PIXEL, 3*PIXEL, PIXEL);
  ctx.fillRect((tx+3)*PIXEL, (ty-2)*PIXEL, PIXEL, PIXEL);

  // Small plant pot on counter far right
  const plx = Math.floor(W * 0.90), ply = cy - 7;
  ctx.fillStyle = '#3a1e08'; // pot
  ctx.fillRect(plx*PIXEL, (ply+4)*PIXEL, 4*PIXEL, 3*PIXEL);
  ctx.fillStyle = '#2a1808';
  ctx.fillRect((plx+1)*PIXEL, (ply+3)*PIXEL, 2*PIXEL, PIXEL); // pot top
  ctx.fillStyle = '#1e380e'; // stems
  ctx.fillRect((plx+1)*PIXEL, ply*PIXEL,       PIXEL, 4*PIXEL);
  ctx.fillRect((plx+2)*PIXEL, (ply+1)*PIXEL,   PIXEL, 3*PIXEL);
  ctx.fillRect((plx+3)*PIXEL, (ply+2)*PIXEL,   PIXEL, 2*PIXEL);
  ctx.fillStyle = '#2a5012'; // leaf highlights
  ctx.fillRect(plx*PIXEL,     (ply+1)*PIXEL,   PIXEL, 2*PIXEL);
  ctx.fillRect((plx+1)*PIXEL, (ply-1)*PIXEL,   PIXEL, PIXEL);

  // Hanging bulb / under-cabinet light strip
  const lightY = cabY + Math.floor(H * 0.14) + 1;
  ctx.fillStyle = 'rgba(255,200,80,0.5)';
  ctx.fillRect(0, lightY * PIXEL, canvas.width, PIXEL);
  ctx.fillStyle = 'rgba(255,180,60,0.12)';
  ctx.fillRect(0, (lightY+1)*PIXEL, canvas.width, 3*PIXEL);

  // Warm ambient pool on counter from above light
  const lightPool = ctx.createLinearGradient(0, lightY * PIXEL, 0, (cy + 4) * PIXEL);
  lightPool.addColorStop(0, 'rgba(255,200,80,0.08)');
  lightPool.addColorStop(1, 'rgba(255,180,60,0)');
  ctx.fillStyle = lightPool;
  ctx.fillRect(0, lightY * PIXEL, canvas.width, (cy + 4 - lightY) * PIXEL);

  // Window light pool on counter surface
  const wPool = ctx.createRadialGradient(
    (wx + ww/2)*PIXEL, cy*PIXEL, 0,
    (wx + ww/2)*PIXEL, cy*PIXEL, ww * 0.7 * PIXEL
  );
  wPool.addColorStop(0, 'rgba(100,120,200,0.07)');
  wPool.addColorStop(1, 'rgba(80,100,180,0)');
  ctx.fillStyle = wPool;
  ctx.fillRect((wx-4)*PIXEL, cy*PIXEL, (ww+8)*PIXEL, 8*PIXEL);
}

function drawLake(W, H) {
  // === SKY — deep violet-blue dusk fading to teal ===
  for (let y = 0; y < H; y++) {
    const t = y / H;
    let r, g, b;
    if (t < 0.35) {
      // upper sky: deep indigo
      const s = t / 0.35;
      r = Math.floor(12 + s * 30);
      g = Math.floor(10 + s * 40);
      b = Math.floor(35 + s * 55);
    } else if (t < 0.55) {
      // horizon: soft teal-green mist
      const s = (t - 0.35) / 0.2;
      r = Math.floor(42 + s * 20);
      g = Math.floor(50 + s * 60);
      b = Math.floor(90 + s * 30);
    } else {
      // water/ground
      const s = (t - 0.55) / 0.45;
      r = Math.floor(30 + s * 25);
      g = Math.floor(65 + s * 30);
      b = Math.floor(75 + s * 15);
    }
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(0, y*PIXEL, canvas.width, PIXEL);
  }

  // === STARS in upper sky ===
  for (let i = 0; i < 80; i++) {
    const sx = Math.floor(Math.random()*W);
    const sy = Math.floor(Math.random()*H*0.3);
    const a = 0.3 + Math.random()*0.6;
    ctx.fillStyle = `rgba(220,230,255,${a})`;
    ctx.fillRect(sx*PIXEL, sy*PIXEL, PIXEL, PIXEL);
  }

  // === MOON — soft, high right ===
  const moonX = Math.floor(W*0.82), moonY = Math.floor(H*0.1);
  const moonGrd = ctx.createRadialGradient(moonX*PIXEL, moonY*PIXEL, 0, moonX*PIXEL, moonY*PIXEL, 9*PIXEL);
  moonGrd.addColorStop(0, 'rgba(230,240,255,0.9)');
  moonGrd.addColorStop(0.5, 'rgba(180,210,255,0.4)');
  moonGrd.addColorStop(1, 'rgba(120,160,220,0)');
  ctx.fillStyle = moonGrd;
  ctx.fillRect((moonX-9)*PIXEL, (moonY-9)*PIXEL, 18*PIXEL, 18*PIXEL);
  // solid moon disc
  for (let dy = -3; dy <= 3; dy++) {
    for (let dx = -3; dx <= 3; dx++) {
      if (dx*dx + dy*dy <= 10) {
        ctx.fillStyle = dy === -3 || dx === -3 ? '#c8d8f0' : '#dce8ff';
        ctx.fillRect((moonX+dx)*PIXEL, (moonY+dy)*PIXEL, PIXEL, PIXEL);
      }
    }
  }

  // === MISTY HORIZON GLOW ===
  const horizonY = Math.floor(H*0.42);
  const hGrd = ctx.createRadialGradient(W/2*PIXEL, horizonY*PIXEL, 0, W/2*PIXEL, horizonY*PIXEL, W*PIXEL*0.6);
  hGrd.addColorStop(0, 'rgba(120,200,180,0.18)');
  hGrd.addColorStop(1, 'rgba(80,150,140,0)');
  ctx.fillStyle = hGrd;
  ctx.fillRect(0, (horizonY-8)*PIXEL, canvas.width, 20*PIXEL);

  // === ROCKS — dark, jagged, mossy ===
  // Left rock mass
  for (let x = 0; x < Math.floor(W*0.28); x++) {
    const noise = Math.sin(x*0.6)*3 + Math.cos(x*0.25)*2;
    const rh = Math.floor(H*0.22 + noise + (W*0.28-x)*0.08);
    const rockBase = Math.floor(H*0.52);
    // shadow side
    const shade = x < W*0.1 ? '#1a1810' : '#242218';
    ctx.fillStyle = shade;
    ctx.fillRect(x*PIXEL, rockBase*PIXEL, PIXEL, rh*PIXEL);
    // mossy top pixels
    if (Math.random() < 0.3) {
      ctx.fillStyle = '#2a3a1a';
      ctx.fillRect(x*PIXEL, rockBase*PIXEL, PIXEL, PIXEL);
    }
  }
  // Right rock mass
  for (let x = Math.floor(W*0.72); x < W; x++) {
    const noise = Math.sin(x*0.5)*3 + Math.cos(x*0.3)*2;
    const rh = Math.floor(H*0.2 + noise + (x-W*0.72)*0.1);
    const rockBase = Math.floor(H*0.5);
    ctx.fillStyle = x > W*0.88 ? '#1a1810' : '#222018';
    ctx.fillRect(x*PIXEL, rockBase*PIXEL, PIXEL, rh*PIXEL);
    if (Math.random() < 0.25) {
      ctx.fillStyle = '#283618';
      ctx.fillRect(x*PIXEL, rockBase*PIXEL, PIXEL, PIXEL);
    }
  }
  // Rock texture / edge detail
  for (let x = 0; x < W; x++) {
    if (x < W*0.28 || x > W*0.72) {
      if (Math.random() < 0.15) {
        const ry = Math.floor(H*0.48 + Math.sin(x*0.4)*2);
        ctx.fillStyle = 'rgba(60,55,40,0.5)';
        ctx.fillRect(x*PIXEL, ry*PIXEL, PIXEL, PIXEL);
      }
    }
  }

  // === LAKE WATER ===
  const lakeTop = Math.floor(H*0.46);
  const lakeBot = Math.floor(H*0.82);
  // Base water — deep teal glowing from centre
  for (let y = lakeTop; y < lakeBot; y++) {
    for (let x = 0; x < W; x++) {
      const t = (y-lakeTop)/(lakeBot-lakeTop);
      // distance from centre ellipse
      const cx2 = W*0.5, cy2 = (lakeTop+lakeBot)*0.5;
      const ellW = W*0.38, ellH = (lakeBot-lakeTop)*0.42;
      const ex = (x-cx2)/ellW, ey = (y-cy2)/ellH;
      const inEll = ex*ex + ey*ey;
      let r, g, b;
      if (inEll < 1) {
        // inner glowing core — yellow-green luminescence
        const glow = Math.max(0, 1 - inEll);
        r = Math.floor(30  + glow*80);
        g = Math.floor(90  + glow*120);
        b = Math.floor(80  + glow*60);
      } else {
        // outer lake — deep teal-blue
        r = Math.floor(25 + t*15);
        g = Math.floor(70 + t*20);
        b = Math.floor(85 + t*10);
      }
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillRect(x*PIXEL, y*PIXEL, PIXEL, PIXEL);
    }
  }

  // === WATER SHIMMER — white sparkles like reference ===
  for (let i = 0; i < 60; i++) {
    const sx = Math.floor(W*0.18 + Math.random()*W*0.64);
    const sy = Math.floor(lakeTop + Math.random()*(lakeBot-lakeTop)*0.85);
    const brightness = Math.random();
    if (brightness > 0.6) {
      ctx.fillStyle = `rgba(220,255,230,${0.4 + brightness*0.5})`;
      ctx.fillRect(sx*PIXEL, sy*PIXEL, PIXEL, PIXEL);
      // cross sparkle
      if (brightness > 0.85) {
        ctx.fillStyle = 'rgba(255,255,240,0.6)';
        ctx.fillRect((sx-1)*PIXEL, sy*PIXEL, PIXEL, PIXEL);
        ctx.fillRect((sx+1)*PIXEL, sy*PIXEL, PIXEL, PIXEL);
        ctx.fillRect(sx*PIXEL, (sy-1)*PIXEL, PIXEL, PIXEL);
      }
    }
  }

  // === MOON REFLECTION in lake ===
  const refX = Math.floor(W*0.5), refY = Math.floor((lakeTop+lakeBot)*0.4);
  for (let dy = -2; dy <= 2; dy++) {
    const w2 = 3 - Math.abs(dy);
    ctx.fillStyle = `rgba(220,240,255,${0.25 - Math.abs(dy)*0.04})`;
    ctx.fillRect((refX-w2)*PIXEL, (refY+dy)*PIXEL, w2*2*PIXEL, PIXEL);
  }

  // === SHORELINE — pebbly, mossy ===
  for (let y = lakeBot; y < H; y++) {
    const t = (y-lakeBot)/(H-lakeBot);
    const r = Math.floor(28 + t*25);
    const g = Math.floor(38 + t*20);
    const b = Math.floor(28 + t*12);
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(0, y*PIXEL, canvas.width, PIXEL);
  }
  // pebble texture
  for (let i = 0; i < 40; i++) {
    const px2 = Math.floor(Math.random()*W);
    const py2 = lakeBot + Math.floor(Math.random()*(H-lakeBot)*0.6);
    ctx.fillStyle = `rgba(${50+Math.floor(Math.random()*30)},${55+Math.floor(Math.random()*20)},${40+Math.floor(Math.random()*15)},0.8)`;
    ctx.fillRect(px2*PIXEL, py2*PIXEL, (1+Math.floor(Math.random()*2))*PIXEL, PIXEL);
  }

  // === PLANTS — foreground and rocks ===
  function drawPlant(px2, py2, h, col1, col2) {
    // stem
    ctx.fillStyle = col1;
    ctx.fillRect(px2*PIXEL, py2*PIXEL, PIXEL, h*PIXEL);
    // leaves alternating
    for (let i = 0; i < h-1; i+=2) {
      ctx.fillStyle = i%4===0 ? col1 : col2;
      ctx.fillRect((px2-1)*PIXEL, (py2+i)*PIXEL, PIXEL, PIXEL);
      ctx.fillRect((px2+1)*PIXEL, (py2+i+1)*PIXEL, PIXEL, PIXEL);
    }
  }
  // left bank plants
  const plantPositions = [
    [2,Math.floor(H*0.44)],[5,Math.floor(H*0.41)],[8,Math.floor(H*0.46)],
    [12,Math.floor(H*0.43)],[16,Math.floor(H*0.48)],[19,Math.floor(H*0.42)],
    [W-4,Math.floor(H*0.45)],[W-8,Math.floor(H*0.42)],[W-12,Math.floor(H*0.47)],
    [W-16,Math.floor(H*0.44)],[W-20,Math.floor(H*0.43)],
  ];
  for (const [px2, py2] of plantPositions) {
    const h = 3 + Math.floor(Math.random()*4);
    drawPlant(px2, py2-h, h, '#2a4a18', '#3a6820');
  }
  // foreground grass tufts at bottom
  for (let i = 0; i < 18; i++) {
    const gx = Math.floor(Math.random()*W);
    const gy = lakeBot + Math.floor(Math.random()*(H-lakeBot)*0.3);
    ctx.fillStyle = '#2a3e18';
    ctx.fillRect(gx*PIXEL, gy*PIXEL, PIXEL, (2+Math.floor(Math.random()*3))*PIXEL);
    ctx.fillStyle = '#3a5420';
    ctx.fillRect((gx-1)*PIXEL, gy*PIXEL, PIXEL, PIXEL);
  }

  // === MIST at waterline ===
  for (let x = 0; x < W; x++) {
    const mist = 0.08 + Math.sin(x*0.3)*0.04 + Math.cos(x*0.17)*0.03;
    ctx.fillStyle = `rgba(160,210,200,${mist})`;
    ctx.fillRect(x*PIXEL, (lakeTop-1)*PIXEL, PIXEL, 3*PIXEL);
    ctx.fillStyle = `rgba(160,210,200,${mist*0.5})`;
    ctx.fillRect(x*PIXEL, (lakeBot-1)*PIXEL, PIXEL, 2*PIXEL);
  }
}

function drawHotel(W, H) {
  const floorY = Math.floor(H * 0.80);

  // === CEILING — deep #780000 crimson ===
  for (let y = 0; y < Math.floor(H * 0.09); y++) {
    const t = y / (H * 0.09);
    const r = Math.floor(0x78 - t*10);
    ctx.fillStyle = `rgb(${r},${Math.floor(t*2)},${Math.floor(t*2)})`;
    ctx.fillRect(0, y * PIXEL, canvas.width, PIXEL);
  }

  // === WALLS — #780000 burgundy fading darker toward floor ===
  for (let y = Math.floor(H * 0.09); y < floorY; y++) {
    const t = (y - H*0.09) / (floorY - H*0.09);
    const r = Math.floor(0x78 - t*28);
    const g = Math.floor(t*3);
    const b = Math.floor(t*5);
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(0, y * PIXEL, canvas.width, PIXEL);
  }

  // === GOLD CORNICE ===
  ctx.fillStyle = '#c0942c';
  ctx.fillRect(0, Math.floor(H*0.09)*PIXEL, canvas.width, PIXEL);
  ctx.fillStyle = '#8a6820';
  ctx.fillRect(0, (Math.floor(H*0.09)+1)*PIXEL, canvas.width, PIXEL);

  // === FLOOR — #669bbc blue-steel ===
  for (let x = 0; x < W; x++) {
    for (let y = floorY; y < H; y++) {
      // subtle herringbone variation
      const diag = (Math.floor(x*0.8) + Math.floor(y*0.8)) % 4;
      const base = diag < 2 ? [0x66, 0x9b, 0xbc] : [0x58, 0x88, 0xa8];
      ctx.fillStyle = `rgb(${base[0]},${base[1]},${base[2]})`;
      ctx.fillRect(x*PIXEL, y*PIXEL, PIXEL, PIXEL);
    }
  }
  ctx.fillStyle = '#4a7a98';
  ctx.fillRect(0, floorY*PIXEL, canvas.width, PIXEL);

  // === CURTAINS — drawn FIRST so window goes on top ===
  // Left curtain panel
  const curtainW = Math.floor(W * 0.14);
  ctx.fillStyle = '#3d0010';
  ctx.fillRect(0, Math.floor(H*0.09)*PIXEL, curtainW*PIXEL, (floorY - Math.floor(H*0.09))*PIXEL);
  // curtain folds
  for (let f = 0; f < 5; f++) {
    ctx.fillStyle = f%2===0 ? 'rgba(80,0,20,0.5)' : 'rgba(20,0,5,0.4)';
    ctx.fillRect((f*Math.floor(curtainW/5))*PIXEL, Math.floor(H*0.09)*PIXEL, Math.floor(curtainW/6)*PIXEL, (floorY-Math.floor(H*0.09))*PIXEL);
  }
  ctx.fillStyle = '#5a0018';
  ctx.fillRect(0, Math.floor(H*0.09)*PIXEL, PIXEL, (floorY-Math.floor(H*0.09))*PIXEL);

  // Right curtain panel
  const rightCurtX = Math.floor(W * 0.86);
  ctx.fillStyle = '#3d0010';
  ctx.fillRect(rightCurtX*PIXEL, Math.floor(H*0.09)*PIXEL, (W-rightCurtX)*PIXEL, (floorY-Math.floor(H*0.09))*PIXEL);
  for (let f = 0; f < 5; f++) {
    ctx.fillStyle = f%2===0 ? 'rgba(80,0,20,0.5)' : 'rgba(20,0,5,0.4)';
    ctx.fillRect((rightCurtX + f*Math.floor((W-rightCurtX)/5))*PIXEL, Math.floor(H*0.09)*PIXEL, Math.floor((W-rightCurtX)/6)*PIXEL, (floorY-Math.floor(H*0.09))*PIXEL);
  }
  ctx.fillStyle = '#5a0018';
  ctx.fillRect((W-1)*PIXEL, Math.floor(H*0.09)*PIXEL, PIXEL, (floorY-Math.floor(H*0.09))*PIXEL);

  // Curtain rod
  ctx.fillStyle = '#c09030';
  ctx.fillRect(0, (Math.floor(H*0.09)-1)*PIXEL, canvas.width, 2*PIXEL);
  ctx.fillStyle = '#e0b040';
  ctx.fillRect(0, (Math.floor(H*0.09)-2)*PIXEL, canvas.width, PIXEL);

  // === MASSIVE WINDOW — full between curtains, floor to near-ceiling ===
  const wwx = curtainW;
  const wwy = Math.floor(H * 0.09);
  const www = rightCurtX - curtainW;
  const wwh = floorY - wwy;

  // ── SUNSET SKY — drawn pixel row by row inside window ──
  for (let y = wwy; y < wwy + wwh; y++) {
    const t = (y - wwy) / wwh;
    let r, g, b;
    if (t < 0.15) {
      // deep midnight blue at top
      const s = t/0.15;
      r = Math.floor(5  + s*15);  g = Math.floor(5  + s*15);  b = Math.floor(30 + s*50);
    } else if (t < 0.38) {
      // indigo-violet band
      const s = (t-0.15)/0.23;
      r = Math.floor(20  + s*90);  g = Math.floor(20  + s*25);  b = Math.floor(80  + s*55);
    } else if (t < 0.55) {
      // violet to magenta-pink horizon glow
      const s = (t-0.38)/0.17;
      r = Math.floor(110 + s*130); g = Math.floor(45  + s*45);  b = Math.floor(135 - s*70);
    } else if (t < 0.66) {
      // burning orange sunset band
      const s = (t-0.55)/0.11;
      r = Math.floor(240 + s*10);  g = Math.floor(90  + s*60);  b = Math.floor(65  - s*40);
    } else if (t < 0.75) {
      // low warm glow just above city
      const s = (t-0.66)/0.09;
      r = Math.floor(250 - s*30);  g = Math.floor(150 - s*30);  b = Math.floor(25  - s*5);
    } else {
      // dark water below
      const s = (t-0.75)/0.25;
      r = Math.floor(220 - s*180); g = Math.floor(120 - s*95);  b = Math.floor(20  + s*35);
    }
    ctx.fillStyle = `rgb(${Math.min(255,r)},${Math.min(255,g)},${Math.min(255,b)})`;
    ctx.fillRect(wwx*PIXEL, y*PIXEL, www*PIXEL, PIXEL);
  }

  // ── STARS ──
  for (let i = 0; i < 40; i++) {
    const sx = wwx + Math.floor(Math.random()*www);
    const sy = wwy + Math.floor(Math.random()*Math.floor(wwh*0.28));
    const br = 0.3 + Math.random()*0.65;
    ctx.fillStyle = `rgba(220,225,255,${br})`;
    ctx.fillRect(sx*PIXEL, sy*PIXEL, PIXEL, PIXEL);
    if (br > 0.8) {
      ctx.fillStyle = `rgba(200,210,255,0.3)`;
      ctx.fillRect((sx-1)*PIXEL, sy*PIXEL, PIXEL, PIXEL);
      ctx.fillRect((sx+1)*PIXEL, sy*PIXEL, PIXEL, PIXEL);
    }
  }

  // ── HORIZON GLOW ──
  const horizonY = wwy + Math.floor(wwh * 0.68);
  const hGlow = ctx.createRadialGradient(
    (wwx + www/2)*PIXEL, horizonY*PIXEL, 0,
    (wwx + www/2)*PIXEL, horizonY*PIXEL, www*0.55*PIXEL
  );
  hGlow.addColorStop(0, 'rgba(255,160,40,0.3)');
  hGlow.addColorStop(1, 'rgba(255,100,20,0)');
  ctx.fillStyle = hGlow;
  ctx.fillRect(wwx*PIXEL, (horizonY-8)*PIXEL, www*PIXEL, 16*PIXEL);

  // ── CITY SILHOUETTE ──
  for (let x = 0; x < www; x++) {
    const bh = Math.floor(4 + Math.abs(Math.sin(x*0.28+0.7)*8) + Math.abs(Math.cos(x*0.15+0.3)*5));
    ctx.fillStyle = '#060408';
    ctx.fillRect((wwx+x)*PIXEL, (horizonY-bh)*PIXEL, PIXEL, bh*PIXEL);
  }

  // ── LIT WINDOWS in buildings — dense and twinkling ──
  for (let i = 0; i < 120; i++) {
    const wx2 = wwx + Math.floor(Math.random()*www);
    const buildingTop = horizonY - Math.floor(4 + Math.abs(Math.sin(wx2*0.28+0.7)*8) + Math.abs(Math.cos(wx2*0.15+0.3)*5));
    if (buildingTop >= horizonY) continue;
    const wy2 = buildingTop + Math.floor(Math.random()*(horizonY - buildingTop - 1));
    const warm = Math.random() < 0.55;
    ctx.fillStyle = warm ? '#ffe890' : '#90c8ff';
    ctx.fillRect(wx2*PIXEL, wy2*PIXEL, PIXEL, PIXEL);
  }

  // ── WATER — dark reflective below city ──
  for (let y = horizonY; y < wwy + wwh; y++) {
    const t = (y-horizonY)/(wwy+wwh-horizonY);
    ctx.fillStyle = `rgb(${Math.floor(15-t*8)},${Math.floor(18+t*5)},${Math.floor(32+t*18)})`;
    ctx.fillRect(wwx*PIXEL, y*PIXEL, www*PIXEL, PIXEL);
  }

  // ── WATER REFLECTIONS of city lights ──
  for (let i = 0; i < 60; i++) {
    const rx = wwx + Math.floor(Math.random()*www);
    const ry = horizonY + 1 + Math.floor(Math.random()*(wwy+wwh-horizonY-2));
    const warm = Math.random() < 0.55;
    const alpha = 0.2 + Math.random()*0.35;
    ctx.fillStyle = warm ? `rgba(255,220,100,${alpha})` : `rgba(100,170,255,${alpha})`;
    ctx.fillRect(rx*PIXEL, ry*PIXEL, (1+Math.floor(Math.random()*3))*PIXEL, PIXEL);
  }

  // ── WINDOW FRAME on top — thin dark bars ──
  ctx.fillStyle = '#1a1008';
  // outer frame edges
  ctx.fillRect(wwx*PIXEL, wwy*PIXEL, 2*PIXEL, wwh*PIXEL);
  ctx.fillRect((wwx+www-2)*PIXEL, wwy*PIXEL, 2*PIXEL, wwh*PIXEL);
  ctx.fillRect(wwx*PIXEL, wwy*PIXEL, www*PIXEL, 2*PIXEL);
  ctx.fillRect(wwx*PIXEL, (wwy+wwh-2)*PIXEL, www*PIXEL, 2*PIXEL);
  // two vertical mullions
  const third = Math.floor(www/3);
  ctx.fillRect((wwx+third)*PIXEL,   wwy*PIXEL, 2*PIXEL, wwh*PIXEL);
  ctx.fillRect((wwx+third*2)*PIXEL, wwy*PIXEL, 2*PIXEL, wwh*PIXEL);
  // one horizontal transom
  ctx.fillRect(wwx*PIXEL, (wwy+Math.floor(wwh*0.48))*PIXEL, www*PIXEL, 2*PIXEL);
  // frame highlight
  ctx.fillStyle = '#2e1c0c';
  ctx.fillRect(wwx*PIXEL, wwy*PIXEL, PIXEL, wwh*PIXEL);

  // === WALL SCONCE — right wall ===
  const scx = Math.floor(W*0.93), scy = Math.floor(H*0.32);
  const sg2 = ctx.createRadialGradient(scx*PIXEL,scy*PIXEL,0,scx*PIXEL,scy*PIXEL,13*PIXEL);
  sg2.addColorStop(0,'rgba(255,200,90,0.38)');
  sg2.addColorStop(1,'rgba(255,140,30,0)');
  ctx.fillStyle = sg2;
  ctx.fillRect((scx-13)*PIXEL,(scy-11)*PIXEL,26*PIXEL,22*PIXEL);
  ctx.fillStyle = '#5a3a18';
  ctx.fillRect((scx-1)*PIXEL,scy*PIXEL,3*PIXEL,4*PIXEL);
  ctx.fillRect((scx-2)*PIXEL,(scy+1)*PIXEL,5*PIXEL,PIXEL);
  for (let i=-1; i<=1; i++) {
    ctx.fillStyle='#d8b860'; ctx.fillRect((scx+i)*PIXEL,(scy-3)*PIXEL,PIXEL,3*PIXEL);
    ctx.fillStyle='#fff080'; ctx.fillRect((scx+i)*PIXEL,(scy-5)*PIXEL,PIXEL,2*PIXEL);
  }

  // === BED — low modern platform ===
  const bx = Math.floor(W*0.38), bw = Math.floor(W*0.46);
  const headY = Math.floor(H*0.47), headH = Math.floor(H*0.26);

  // headboard — pale upholstered
  ctx.fillStyle = '#c0b0a0';
  ctx.fillRect(bx*PIXEL, headY*PIXEL, bw*PIXEL, headH*PIXEL);
  // tufting grid
  ctx.fillStyle = '#a89888';
  for (let i=1; i<5; i++) ctx.fillRect((bx+Math.floor(bw*i/5))*PIXEL, headY*PIXEL, PIXEL, headH*PIXEL);
  for (let j=1; j<3; j++) ctx.fillRect(bx*PIXEL, (headY+Math.floor(headH*j/3))*PIXEL, bw*PIXEL, PIXEL);
  ctx.fillStyle = '#d8cfc0';
  ctx.fillRect(bx*PIXEL, headY*PIXEL, bw*PIXEL, PIXEL);
  ctx.fillStyle = '#887868';
  ctx.fillRect(bx*PIXEL, (headY+headH-1)*PIXEL, bw*PIXEL, PIXEL);

  const mattY = headY + headH;
  // platform base
  ctx.fillStyle = '#3d0010';
  ctx.fillRect((bx-2)*PIXEL, mattY*PIXEL, (bw+4)*PIXEL, 5*PIXEL);
  // mattress — white
  ctx.fillStyle = '#f0ece4';
  ctx.fillRect(bx*PIXEL, mattY*PIXEL, bw*PIXEL, 5*PIXEL);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(bx*PIXEL, mattY*PIXEL, bw*PIXEL, PIXEL);
  // gold throw
  ctx.fillStyle = '#b8943a';
  ctx.fillRect((bx+Math.floor(bw*0.1))*PIXEL, (mattY+2)*PIXEL, Math.floor(bw*0.8)*PIXEL, 4*PIXEL);
  ctx.fillStyle = '#c8a840';
  ctx.fillRect((bx+Math.floor(bw*0.1))*PIXEL, (mattY+2)*PIXEL, Math.floor(bw*0.8)*PIXEL, PIXEL);
  // pillows
  const pw2 = Math.floor(bw*0.22);
  ctx.fillStyle = '#f8f4ec';
  ctx.fillRect((bx+3)*PIXEL, (mattY-2)*PIXEL, pw2*PIXEL, 4*PIXEL);
  ctx.fillRect((bx+bw-3-pw2)*PIXEL, (mattY-2)*PIXEL, pw2*PIXEL, 4*PIXEL);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect((bx+3)*PIXEL, (mattY-2)*PIXEL, pw2*PIXEL, PIXEL);
  ctx.fillRect((bx+bw-3-pw2)*PIXEL, (mattY-2)*PIXEL, pw2*PIXEL, PIXEL);
  ctx.fillStyle = '#d8d0c4';
  ctx.fillRect((bx+3)*PIXEL, (mattY+1)*PIXEL, pw2*PIXEL, PIXEL);
  ctx.fillRect((bx+bw-3-pw2)*PIXEL, (mattY+1)*PIXEL, pw2*PIXEL, PIXEL);

  // bench at foot
  const benchX = bx+Math.floor(bw*0.15), benchY=mattY+5, benchW=Math.floor(bw*0.7);
  ctx.fillStyle = '#3d0010';
  ctx.fillRect(benchX*PIXEL, benchY*PIXEL, benchW*PIXEL, 4*PIXEL);
  ctx.fillStyle = '#5a0018';
  ctx.fillRect(benchX*PIXEL, benchY*PIXEL, benchW*PIXEL, PIXEL);
  ctx.fillStyle = '#2a0008';
  ctx.fillRect(benchX*PIXEL,(benchY+4)*PIXEL,2*PIXEL,2*PIXEL);
  ctx.fillRect((benchX+benchW-2)*PIXEL,(benchY+4)*PIXEL,2*PIXEL,2*PIXEL);

  // === NIGHTSTANDS ===
  function drawNS(nx, ny) {
    ctx.fillStyle='#2a0008';
    ctx.fillRect(nx*PIXEL,ny*PIXEL,9*PIXEL,6*PIXEL);
    ctx.fillStyle='#3d0010';
    ctx.fillRect(nx*PIXEL,ny*PIXEL,9*PIXEL,PIXEL);
    ctx.fillStyle='#1a0005';
    ctx.fillRect(nx*PIXEL,(ny+3)*PIXEL,9*PIXEL,PIXEL);
    ctx.fillStyle='#c09030'; ctx.fillRect((nx+4)*PIXEL,(ny+1)*PIXEL,PIXEL,PIXEL);
    ctx.fillRect((nx+4)*PIXEL,(ny+4)*PIXEL,PIXEL,PIXEL);
    // lamp glow
    const lg=ctx.createRadialGradient((nx+4)*PIXEL,(ny-5)*PIXEL,0,(nx+4)*PIXEL,(ny-5)*PIXEL,10*PIXEL);
    lg.addColorStop(0,'rgba(255,210,100,0.48)'); lg.addColorStop(1,'rgba(255,160,40,0)');
    ctx.fillStyle=lg; ctx.fillRect((nx-6)*PIXEL,(ny-13)*PIXEL,20*PIXEL,16*PIXEL);
    // shade
    ctx.fillStyle='#d4a040';
    ctx.fillRect((nx+1)*PIXEL,(ny-8)*PIXEL,7*PIXEL,5*PIXEL);
    ctx.fillStyle='#b88030';
    ctx.fillRect((nx+2)*PIXEL,(ny-10)*PIXEL,5*PIXEL,2*PIXEL);
    ctx.fillRect((nx+3)*PIXEL,(ny-11)*PIXEL,3*PIXEL,PIXEL);
    ctx.fillStyle='#c89038'; ctx.fillRect(nx*PIXEL,(ny-4)*PIXEL,9*PIXEL,PIXEL);
    ctx.fillStyle='rgba(255,240,160,0.85)'; ctx.fillRect((nx+3)*PIXEL,(ny-7)*PIXEL,3*PIXEL,3*PIXEL);
    // pink ceramic base
    ctx.fillStyle='#c07878'; ctx.fillRect((nx+3)*PIXEL,(ny-3)*PIXEL,3*PIXEL,3*PIXEL);
    ctx.fillStyle='#d08888'; ctx.fillRect((nx+3)*PIXEL,(ny-3)*PIXEL,3*PIXEL,PIXEL);
  }
  drawNS(bx-11, floorY-7);
  drawNS(bx+bw+2, floorY-7);

  // === SOFA foreground — richly patterned ===
  const sofX=Math.floor(W*0.02), sofY=Math.floor(H*0.64), sofW=Math.floor(W*0.34);
  ctx.fillStyle='#5a1c10';
  ctx.fillRect(sofX*PIXEL,sofY*PIXEL,sofW*PIXEL,Math.floor(H*0.15)*PIXEL);
  for (let x2=0;x2<sofW;x2+=3) for (let y2=0;y2<Math.floor(H*0.15);y2+=3) {
    ctx.fillStyle=(Math.floor(x2/3)+Math.floor(y2/3))%2===0?'rgba(100,30,15,0.3)':'rgba(140,55,25,0.2)';
    ctx.fillRect((sofX+x2)*PIXEL,(sofY+y2)*PIXEL,2*PIXEL,2*PIXEL);
  }
  ctx.fillStyle='#7a2c1c'; ctx.fillRect(sofX*PIXEL,sofY*PIXEL,sofW*PIXEL,PIXEL);
  ctx.fillStyle='#481408';
  ctx.fillRect(sofX*PIXEL,(sofY-3)*PIXEL,4*PIXEL,(Math.floor(H*0.15)+3)*PIXEL);
  ctx.fillRect((sofX+sofW-4)*PIXEL,(sofY-3)*PIXEL,4*PIXEL,(Math.floor(H*0.15)+3)*PIXEL);
  ctx.fillStyle='#6a2010';
  ctx.fillRect(sofX*PIXEL,(sofY-3)*PIXEL,4*PIXEL,PIXEL);
  ctx.fillRect((sofX+sofW-4)*PIXEL,(sofY-3)*PIXEL,4*PIXEL,PIXEL);
  ctx.fillStyle='#a07820';
  ctx.fillRect((sofX+2)*PIXEL,(sofY+Math.floor(H*0.15))*PIXEL,2*PIXEL,2*PIXEL);
  ctx.fillRect((sofX+sofW-4)*PIXEL,(sofY+Math.floor(H*0.15))*PIXEL,2*PIXEL,2*PIXEL);
  // cushions — teal, mustard, navy
  const cushions=[
    {dx:5,w:8,h:9,col:'#1a4840',hi:'#24604e'},
    {dx:14,w:9,h:9,col:'#8a6a10',hi:'#b08820'},
    {dx:24,w:8,h:9,col:'#0e1840',hi:'#182458'},
  ];
  for (const cu of cushions) {
    ctx.fillStyle=cu.col; ctx.fillRect((sofX+cu.dx)*PIXEL,(sofY+1)*PIXEL,cu.w*PIXEL,cu.h*PIXEL);
    ctx.fillStyle=cu.hi;  ctx.fillRect((sofX+cu.dx)*PIXEL,(sofY+1)*PIXEL,cu.w*PIXEL,PIXEL);
    ctx.fillRect((sofX+cu.dx)*PIXEL,(sofY+1)*PIXEL,PIXEL,cu.h*PIXEL);
  }

  // === RUG — #669bbc blue with gold border ===
  const rugX=Math.floor(W*0.18),rugY=Math.floor(H*0.75),rugW=Math.floor(W*0.64),rugH=Math.floor(H*0.13);
  ctx.fillStyle='#669bbc';
  ctx.fillRect(rugX*PIXEL,rugY*PIXEL,rugW*PIXEL,rugH*PIXEL);
  // slightly darker centre
  ctx.fillStyle='rgba(40,70,100,0.25)';
  ctx.fillRect((rugX+4)*PIXEL,(rugY+3)*PIXEL,(rugW-8)*PIXEL,(rugH-6)*PIXEL);
  // gold border
  ctx.fillStyle='#9a7418';
  ctx.fillRect(rugX*PIXEL,rugY*PIXEL,rugW*PIXEL,2*PIXEL);
  ctx.fillRect(rugX*PIXEL,(rugY+rugH-2)*PIXEL,rugW*PIXEL,2*PIXEL);
  ctx.fillRect(rugX*PIXEL,rugY*PIXEL,2*PIXEL,rugH*PIXEL);
  ctx.fillRect((rugX+rugW-2)*PIXEL,rugY*PIXEL,2*PIXEL,rugH*PIXEL);
  ctx.fillStyle='#c09820';
  ctx.fillRect(rugX*PIXEL,rugY*PIXEL,rugW*PIXEL,PIXEL);
  ctx.fillRect(rugX*PIXEL,rugY*PIXEL,PIXEL,rugH*PIXEL);
  // blob motifs
  ctx.fillStyle='rgba(30,60,100,0.55)';
  for (let i=0;i<5;i++) {
    const mx=rugX+5+Math.floor(i*(rugW-10)/4), my=rugY+Math.floor(rugH/2);
    ctx.fillRect((mx-2)*PIXEL,(my-2)*PIXEL,5*PIXEL,5*PIXEL);
    ctx.fillRect((mx-3)*PIXEL,(my-1)*PIXEL,7*PIXEL,3*PIXEL);
  }

  // === CEILING PENDANT ===
  const pendX=Math.floor(W*0.60), pendY=Math.floor(H*0.06);
  const pg=ctx.createRadialGradient(pendX*PIXEL,pendY*PIXEL,0,pendX*PIXEL,pendY*PIXEL,22*PIXEL);
  pg.addColorStop(0,'rgba(255,220,150,0.32)'); pg.addColorStop(1,'rgba(255,170,60,0)');
  ctx.fillStyle=pg; ctx.fillRect((pendX-22)*PIXEL,0,44*PIXEL,24*PIXEL);
  ctx.fillStyle='#c0a030'; ctx.fillRect((pendX-4)*PIXEL,0,8*PIXEL,PIXEL);
  ctx.fillStyle='#d0b038'; ctx.fillRect((pendX-2)*PIXEL,PIXEL,5*PIXEL,2*PIXEL);
  for (let dy=-3;dy<=3;dy++) {
    const hw=Math.floor(Math.sqrt(Math.max(0,9-dy*dy)));
    ctx.fillStyle=dy===0?'#e8dca8':'#c8bc90';
    ctx.fillRect((pendX-hw)*PIXEL,(pendY+dy)*PIXEL,hw*2*PIXEL,PIXEL);
  }
  ctx.fillStyle='rgba(255,245,200,0.75)'; ctx.fillRect((pendX-2)*PIXEL,(pendY-1)*PIXEL,4*PIXEL,2*PIXEL);

  // === GOLD PICTURE FRAMES left wall ===
  const picX=Math.floor(W*0.04), picBaseY=Math.floor(H*0.15);
  for (let i=0;i<3;i++) {
    const pfx=picX, pfy=picBaseY+i*Math.floor(H*0.18);
    const pfw=Math.floor(W*0.12), pfh=Math.floor(H*0.13);
    ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect((pfx+2)*PIXEL,(pfy+2)*PIXEL,pfw*PIXEL,pfh*PIXEL);
    ctx.fillStyle='#9a7420'; ctx.fillRect(pfx*PIXEL,pfy*PIXEL,pfw*PIXEL,pfh*PIXEL);
    ctx.fillStyle='#d8cfc0'; ctx.fillRect((pfx+2)*PIXEL,(pfy+2)*PIXEL,(pfw-4)*PIXEL,(pfh-4)*PIXEL);
    ctx.fillStyle='#2a0008'; ctx.fillRect((pfx+4)*PIXEL,(pfy+4)*PIXEL,(pfw-8)*PIXEL,(pfh-8)*PIXEL);
    ctx.fillStyle=`rgba(${0x78},${5+i*3},${8+i*3},0.9)`;
    ctx.fillRect((pfx+5)*PIXEL,(pfy+5)*PIXEL,(pfw-10)*PIXEL,Math.floor((pfh-10)*0.55)*PIXEL);
    ctx.fillStyle='#c0942a'; ctx.fillRect(pfx*PIXEL,pfy*PIXEL,pfw*PIXEL,PIXEL);
    ctx.fillRect(pfx*PIXEL,pfy*PIXEL,PIXEL,pfh*PIXEL);
  }

  // === LAMP FLOOR REFLECTIONS on #669bbc floor ===
  for (const nx of [bx-11+4, bx+bw+2+4]) {
    const fr2=ctx.createRadialGradient(nx*PIXEL,floorY*PIXEL,0,nx*PIXEL,floorY*PIXEL,14*PIXEL);
    fr2.addColorStop(0,'rgba(255,190,70,0.18)'); fr2.addColorStop(1,'rgba(255,140,30,0)');
    ctx.fillStyle=fr2; ctx.fillRect((nx-14)*PIXEL,floorY*PIXEL,28*PIXEL,8*PIXEL);
  }
}

function drawHospital(W, H) {
  const floorY = Math.floor(H * 0.68);
  const vpX = Math.floor(W / 2);  // vanishing point x
  const vpY = Math.floor(H * 0.32); // vanishing point y

  // === WALLS — cold grey-blue, gradient to vanishing point ===
  for (let y = 0; y < H; y++) {
    const t = y / H;
    // ceiling darker, walls lighten slightly toward middle
    const r = Math.floor(14 + t * 18);
    const g = Math.floor(18 + t * 20);
    const b = Math.floor(26 + t * 22);
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(0, y * PIXEL, canvas.width, PIXEL);
  }

  // === PERSPECTIVE WALL PANELS — converging to VP ===
  // Left wall panels receding right
  const numPanels = 5;
  for (let i = 0; i <= numPanels; i++) {
    const t = i / numPanels;
    // left wall edge at floor
    const lx = Math.floor(W * t * 0.45);
    const ly = floorY;
    ctx.strokeStyle = `rgba(140,165,190,${0.12 - t * 0.02})`;
    ctx.lineWidth = PIXEL * 0.5;
    ctx.beginPath();
    ctx.moveTo(vpX * PIXEL, vpY * PIXEL);
    ctx.lineTo(lx * PIXEL, ly * PIXEL);
    ctx.stroke();
    // ceiling
    ctx.beginPath();
    ctx.moveTo(vpX * PIXEL, vpY * PIXEL);
    ctx.lineTo(lx * PIXEL, 0);
    ctx.stroke();
  }
  // Right wall panels
  for (let i = 0; i <= numPanels; i++) {
    const t = i / numPanels;
    const rx = Math.floor(W - W * t * 0.45);
    ctx.beginPath();
    ctx.moveTo(vpX * PIXEL, vpY * PIXEL);
    ctx.lineTo(rx * PIXEL, floorY * PIXEL);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(vpX * PIXEL, vpY * PIXEL);
    ctx.lineTo(rx * PIXEL, 0);
    ctx.stroke();
  }
  ctx.lineWidth = 1;

  // === CEILING — dark, with fluorescent fixture strip ===
  ctx.fillStyle = 'rgba(10,14,20,0.5)';
  ctx.fillRect(0, 0, canvas.width, Math.floor(H * 0.08) * PIXEL);

  // Fluorescent tube strip down the ceiling centre, receding in perspective
  const flicker = Math.random() > 0.07;
  // Tubes get smaller toward VP
  const tubePositions = [0.08, 0.22, 0.38, 0.54, 0.68, 0.8, 0.9, 0.96];
  for (let i = 0; i < tubePositions.length; i++) {
    const t = tubePositions[i];
    const ty = Math.floor(H * t);
    // tube width shrinks with perspective
    const tw = Math.max(1, Math.floor((1 - t) * 12 + 2));
    const tx = vpX - Math.floor(tw / 2);
    const on = flicker && (i < 6 || Math.random() > 0.3);
    ctx.fillStyle = on ? '#d0ecf8' : '#1a2830';
    ctx.fillRect(tx * PIXEL, ty * PIXEL, tw * PIXEL, Math.max(1, Math.floor(PIXEL * 0.5)));
    if (on) {
      const gr = ctx.createRadialGradient(
        vpX * PIXEL, ty * PIXEL, 0,
        vpX * PIXEL, ty * PIXEL, tw * PIXEL * 2
      );
      gr.addColorStop(0, `rgba(160,210,240,${0.22 - t * 0.15})`);
      gr.addColorStop(1, 'rgba(140,195,230,0)');
      ctx.fillStyle = gr;
      ctx.fillRect((vpX - tw * 3) * PIXEL, (ty - tw) * PIXEL, tw * 6 * PIXEL, tw * 2 * PIXEL);
    }
  }

  // === FLOOR — cold pale tiles receding to VP ===
  // Base floor colour
  for (let y = floorY; y < H; y++) {
    const t = (y - floorY) / (H - floorY);
    const shade = Math.floor(185 + t * 30);
    ctx.fillStyle = `rgb(${shade - 8},${shade},${shade + 8})`;
    ctx.fillRect(0, y * PIXEL, canvas.width, PIXEL);
  }
  // Perspective tile grid lines — converge to VP
  ctx.strokeStyle = 'rgba(160,180,200,0.18)';
  ctx.lineWidth = PIXEL * 0.5;
  // horizontal rows
  const tileRows = 8;
  for (let i = 1; i < tileRows; i++) {
    const t = i / tileRows;
    const fy2 = floorY + Math.floor((H - floorY) * (1 - (1 - t) * (1 - t)));
    ctx.beginPath();
    ctx.moveTo(0, fy2 * PIXEL);
    ctx.lineTo(canvas.width, fy2 * PIXEL);
    ctx.stroke();
  }
  // column lines converging to VP
  for (let i = -6; i <= 6; i++) {
    const ex = vpX + i * Math.floor(W * 0.09);
    ctx.beginPath();
    ctx.moveTo(vpX * PIXEL, floorY * PIXEL);
    ctx.lineTo(ex * PIXEL, H * PIXEL);
    ctx.stroke();
  }
  ctx.lineWidth = 1;

  // Floor specular sheen
  const sheen = ctx.createLinearGradient(vpX * PIXEL, floorY * PIXEL, vpX * PIXEL, H * PIXEL);
  sheen.addColorStop(0, 'rgba(200,220,240,0.12)');
  sheen.addColorStop(1, 'rgba(180,205,225,0)');
  ctx.fillStyle = sheen;
  ctx.fillRect(0, floorY * PIXEL, canvas.width, (H - floorY) * PIXEL);

  // === WALL BASEBOARD ===
  ctx.fillStyle = 'rgba(100,120,140,0.15)';
  ctx.fillRect(0, (floorY - 3) * PIXEL, canvas.width, 3 * PIXEL);

  // === WAINSCOTING PANELS on side walls ===
  // Left side
  for (let i = 0; i < 3; i++) {
    const t = (i + 1) / 4;
    const px2 = Math.floor(W * t * 0.42);
    const pw2 = Math.floor(W * 0.08 * (1 - t * 0.5));
    const ph2 = Math.floor(H * 0.25 * (1 - t * 0.3));
    const py2 = Math.floor(floorY - ph2 - 2);
    ctx.fillStyle = `rgba(120,145,165,${0.08 - t * 0.02})`;
    ctx.fillRect(px2 * PIXEL, py2 * PIXEL, pw2 * PIXEL, ph2 * PIXEL);
    ctx.fillStyle = `rgba(160,185,205,0.06)`;
    ctx.fillRect(px2 * PIXEL, py2 * PIXEL, PIXEL, ph2 * PIXEL);
    ctx.fillRect(px2 * PIXEL, py2 * PIXEL, pw2 * PIXEL, PIXEL);
  }
  // Right side (mirror)
  for (let i = 0; i < 3; i++) {
    const t = (i + 1) / 4;
    const px2 = Math.floor(W - W * t * 0.42 - W * 0.08 * (1 - t * 0.5));
    const pw2 = Math.floor(W * 0.08 * (1 - t * 0.5));
    const ph2 = Math.floor(H * 0.25 * (1 - t * 0.3));
    const py2 = Math.floor(floorY - ph2 - 2);
    ctx.fillStyle = `rgba(120,145,165,${0.08 - t * 0.02})`;
    ctx.fillRect(px2 * PIXEL, py2 * PIXEL, pw2 * PIXEL, ph2 * PIXEL);
    ctx.fillStyle = `rgba(160,185,205,0.06)`;
    ctx.fillRect((px2 + pw2 - 1) * PIXEL, py2 * PIXEL, PIXEL, ph2 * PIXEL);
    ctx.fillRect(px2 * PIXEL, py2 * PIXEL, pw2 * PIXEL, PIXEL);
  }

  // === DOORS — receding in perspective ===
  const doorData = [
    { side: 'L', i: 0 }, { side: 'R', i: 0 },
    { side: 'L', i: 1 }, { side: 'R', i: 1 },
    { side: 'L', i: 2 },
  ];
  for (const { side, i } of doorData) {
    const persp = 1 - i * 0.28;
    const dw = Math.max(2, Math.floor(7 * persp));
    const dh = Math.max(3, Math.floor(14 * persp));
    const baseX = side === 'L'
      ? Math.floor(W * (0.12 + i * 0.12))
      : Math.floor(W * (0.88 - i * 0.12) - dw);
    const dy = floorY - dh;
    // door shadow
    ctx.fillStyle = `rgba(8,12,18,${0.5 * persp})`;
    ctx.fillRect((baseX + 1) * PIXEL, (dy + 1) * PIXEL, dw * PIXEL, dh * PIXEL);
    // door face
    ctx.fillStyle = `rgb(${Math.floor(155 * persp + 20)},${Math.floor(175 * persp + 20)},${Math.floor(195 * persp + 20)})`;
    ctx.fillRect(baseX * PIXEL, dy * PIXEL, dw * PIXEL, dh * PIXEL);
    // door frame
    ctx.fillStyle = `rgba(80,100,120,${0.4 * persp})`;
    ctx.fillRect(baseX * PIXEL, dy * PIXEL, PIXEL, dh * PIXEL);
    ctx.fillRect((baseX + dw - 1) * PIXEL, dy * PIXEL, PIXEL, dh * PIXEL);
    ctx.fillRect(baseX * PIXEL, dy * PIXEL, dw * PIXEL, PIXEL);
    // panel detail
    if (dw >= 5) {
      ctx.fillStyle = `rgba(130,155,175,${0.2 * persp})`;
      ctx.fillRect((baseX + 1) * PIXEL, (dy + 2) * PIXEL, (dw - 2) * PIXEL, Math.floor(dh * 0.4) * PIXEL);
      ctx.fillRect((baseX + 1) * PIXEL, (dy + Math.floor(dh * 0.5)) * PIXEL, (dw - 2) * PIXEL, Math.floor(dh * 0.38) * PIXEL);
    }
    // handle
    if (dw >= 4) {
      ctx.fillStyle = `rgba(180,190,200,${0.6 * persp})`;
      const handleX = side === 'L' ? baseX + dw - 2 : baseX + 1;
      ctx.fillRect(handleX * PIXEL, (dy + Math.floor(dh * 0.5)) * PIXEL, PIXEL, 2 * PIXEL);
    }
  }

  // === FIGURE — lone silhouette near VP ===
  const fx = vpX, fy = Math.floor(vpY + 2);
  // cast glow from exit behind figure
  const figGlow = ctx.createRadialGradient(fx * PIXEL, fy * PIXEL, 0, fx * PIXEL, fy * PIXEL, 12 * PIXEL);
  figGlow.addColorStop(0, 'rgba(180,215,240,0.12)');
  figGlow.addColorStop(1, 'rgba(140,190,220,0)');
  ctx.fillStyle = figGlow;
  ctx.fillRect((fx - 12) * PIXEL, (fy - 4) * PIXEL, 24 * PIXEL, 20 * PIXEL);

  ctx.fillStyle = 'rgba(30,42,56,0.92)';
  ctx.fillRect((fx - 1) * PIXEL, fy * PIXEL, 3 * PIXEL, 8 * PIXEL);       // body
  ctx.fillRect(fx * PIXEL, (fy - 2) * PIXEL, 2 * PIXEL, 2 * PIXEL);        // head
  ctx.fillRect((fx - 2) * PIXEL, (fy + 1) * PIXEL, 2 * PIXEL, 5 * PIXEL); // left arm
  ctx.fillRect((fx + 3) * PIXEL, (fy + 1) * PIXEL, 2 * PIXEL, 5 * PIXEL); // right arm
  ctx.fillRect((fx - 1) * PIXEL, (fy + 8) * PIXEL, 2 * PIXEL, 3 * PIXEL); // left leg
  ctx.fillRect((fx + 2) * PIXEL, (fy + 8) * PIXEL, 2 * PIXEL, 3 * PIXEL); // right leg
  // floor reflection
  ctx.fillStyle = 'rgba(30,42,56,0.12)';
  ctx.fillRect((fx - 1) * PIXEL, (fy + 11) * PIXEL, 3 * PIXEL, 3 * PIXEL);

  // === EXIT SIGN — glowing green at VP ===
  const exX = vpX - 3, exY = Math.floor(vpY - 6);
  // glow aura
  const exGlow = ctx.createRadialGradient(vpX * PIXEL, exY * PIXEL, 0, vpX * PIXEL, exY * PIXEL, 10 * PIXEL);
  exGlow.addColorStop(0, 'rgba(0,200,80,0.18)');
  exGlow.addColorStop(1, 'rgba(0,160,60,0)');
  ctx.fillStyle = exGlow;
  ctx.fillRect((exX - 5) * PIXEL, (exY - 4) * PIXEL, 16 * PIXEL, 10 * PIXEL);
  ctx.fillStyle = '#002a0c';
  ctx.fillRect(exX * PIXEL, exY * PIXEL, 6 * PIXEL, 3 * PIXEL);
  ctx.fillStyle = '#00e050';
  ctx.fillRect((exX + 1) * PIXEL, exY * PIXEL, 4 * PIXEL, PIXEL);
  ctx.fillStyle = '#00ff70';
  ctx.fillRect((exX + 2) * PIXEL, exY * PIXEL, 2 * PIXEL, PIXEL);

  // === WALL CLOCK — left wall ===
  const clkX = Math.floor(W * 0.14), clkY = Math.floor(H * 0.22);
  ctx.fillStyle = '#b8c8d4';
  for (let dy2 = -4; dy2 <= 4; dy2++) for (let dx = -4; dx <= 4; dx++) {
    if (dx * dx + dy2 * dy2 <= 18) {
      ctx.fillStyle = dx === 0 && dy2 === 0 ? '#e0eaf0' : '#c0d0dc';
      ctx.fillRect((clkX + dx) * PIXEL, (clkY + dy2) * PIXEL, PIXEL, PIXEL);
    }
  }
  ctx.fillStyle = '#3a5060';
  ctx.fillRect(clkX * PIXEL, (clkY - 3) * PIXEL, PIXEL, 3 * PIXEL);
  ctx.fillRect(clkX * PIXEL, clkY * PIXEL, 3 * PIXEL, PIXEL);

  // === TROLLEY / EQUIPMENT near right wall ===
  const eqX = Math.floor(W * 0.8), eqY = floorY - 8;
  ctx.fillStyle = '#8898a8';
  ctx.fillRect(eqX * PIXEL, eqY * PIXEL, 5 * PIXEL, 7 * PIXEL);
  ctx.fillStyle = '#6a7a88';
  ctx.fillRect(eqX * PIXEL, eqY * PIXEL, 5 * PIXEL, PIXEL);
  ctx.fillRect(eqX * PIXEL, (eqY + 3) * PIXEL, 5 * PIXEL, PIXEL);
  // wheels
  ctx.fillStyle = '#3a4a58';
  ctx.fillRect(eqX * PIXEL, (floorY - 1) * PIXEL, 2 * PIXEL, PIXEL);
  ctx.fillRect((eqX + 3) * PIXEL, (floorY - 1) * PIXEL, 2 * PIXEL, PIXEL);
  // IV bag hang
  ctx.fillStyle = '#7090a0';
  ctx.fillRect((eqX + 2) * PIXEL, (eqY - 4) * PIXEL, PIXEL, 4 * PIXEL);
  ctx.fillStyle = '#a8c8d8';
  ctx.fillRect((eqX + 1) * PIXEL, (eqY - 6) * PIXEL, 3 * PIXEL, 2 * PIXEL);
}

function drawHighway(W, H) {
  // === SKY ===
  for (let y = 0; y < H; y++) {
    const t = y / H;
    ctx.fillStyle = `rgb(${Math.floor(2+t*6)},${Math.floor(2+t*5)},${Math.floor(8+t*10)})`;
    ctx.fillRect(0, y * PIXEL, canvas.width, PIXEL);
  }

  const roadTop = Math.floor(H * 0.5);
  // Headlight source — car position near horizon centre
  const carX = Math.floor(W * 0.5);
  const carY = roadTop + 1; // just below horizon

  // === STARS ===
  for (let i = 0; i < 160; i++) {
    const sx = Math.floor(Math.random() * W);
    const sy = Math.floor(Math.random() * roadTop * 0.85);
    const br = Math.random();
    ctx.fillStyle = `rgba(${185+Math.floor(br*55)},${195+Math.floor(br*45)},255,${0.2+br*0.7})`;
    ctx.fillRect(sx * PIXEL, sy * PIXEL, PIXEL, PIXEL);
    if (br > 0.92) {
      ctx.fillStyle = 'rgba(215,225,255,0.35)';
      ctx.fillRect((sx-1)*PIXEL, sy*PIXEL, PIXEL, PIXEL);
      ctx.fillRect((sx+1)*PIXEL, sy*PIXEL, PIXEL, PIXEL);
    }
  }

  // === TREELINE ===
  for (let x = 0; x < W; x++) {
    const treeH = Math.floor(5 + Math.abs(Math.sin(x*0.38+1)*5) + Math.abs(Math.cos(x*0.19)*4));
    ctx.fillStyle = x % 6 < 3 ? '#020210' : '#040412';
    ctx.fillRect(x * PIXEL, (roadTop - treeH) * PIXEL, PIXEL, treeH * PIXEL);
  }

  // === ROAD BASE ===
  ctx.fillStyle = '#0c0c14';
  ctx.fillRect(0, roadTop * PIXEL, canvas.width, (H - roadTop) * PIXEL);
  ctx.fillStyle = '#16161e';
  ctx.fillRect(0, roadTop * PIXEL, canvas.width, PIXEL);

  // === DIVERGING HEADLIGHT CONE ===
  // Two beams from the focal point (car position at horizon) spreading to screen bottom corners
  // Left beam
  const leftGrd = ctx.createLinearGradient(
    carX * PIXEL, carY * PIXEL,
    Math.floor(W * 0.05) * PIXEL, H * PIXEL
  );
  leftGrd.addColorStop(0, 'rgba(255,255,230,0.0)');
  leftGrd.addColorStop(0.15, 'rgba(255,255,210,0.55)');
  leftGrd.addColorStop(0.5, 'rgba(255,250,200,0.28)');
  leftGrd.addColorStop(1, 'rgba(240,240,180,0.08)');
  ctx.fillStyle = leftGrd;
  ctx.beginPath();
  ctx.moveTo(carX * PIXEL, carY * PIXEL);
  ctx.lineTo(Math.floor(W * 0.0) * PIXEL, H * PIXEL);
  ctx.lineTo(Math.floor(W * 0.46) * PIXEL, H * PIXEL);
  ctx.closePath();
  ctx.fill();

  // Right beam
  const rightGrd = ctx.createLinearGradient(
    carX * PIXEL, carY * PIXEL,
    Math.floor(W * 0.95) * PIXEL, H * PIXEL
  );
  rightGrd.addColorStop(0, 'rgba(255,255,230,0.0)');
  rightGrd.addColorStop(0.15, 'rgba(255,255,210,0.55)');
  rightGrd.addColorStop(0.5, 'rgba(255,250,200,0.28)');
  rightGrd.addColorStop(1, 'rgba(240,240,180,0.08)');
  ctx.fillStyle = rightGrd;
  ctx.beginPath();
  ctx.moveTo(carX * PIXEL, carY * PIXEL);
  ctx.lineTo(Math.floor(W * 0.54) * PIXEL, H * PIXEL);
  ctx.lineTo(Math.floor(W * 1.0) * PIXEL, H * PIXEL);
  ctx.closePath();
  ctx.fill();

  // Bright inner cone — tighter, whiter
  const innerGrd = ctx.createLinearGradient(carX * PIXEL, carY * PIXEL, carX * PIXEL, H * PIXEL);
  innerGrd.addColorStop(0, 'rgba(255,255,245,0.0)');
  innerGrd.addColorStop(0.1, 'rgba(255,255,235,0.7)');
  innerGrd.addColorStop(0.5, 'rgba(255,255,220,0.35)');
  innerGrd.addColorStop(1, 'rgba(250,250,205,0.1)');
  ctx.fillStyle = innerGrd;
  ctx.beginPath();
  ctx.moveTo(carX * PIXEL, carY * PIXEL);
  ctx.lineTo(Math.floor(W * 0.28) * PIXEL, H * PIXEL);
  ctx.lineTo(Math.floor(W * 0.72) * PIXEL, H * PIXEL);
  ctx.closePath();
  ctx.fill();

  // Road surface lit by the beams — tinted yellow-white near centre
  for (let y = roadTop + 1; y < H; y++) {
    const t = (y - roadTop) / (H - roadTop);
    // how wide is the lit cone at this y?
    const halfW = Math.floor((t * W * 0.46));
    const litL = Math.max(0, carX - halfW);
    const litR = Math.min(W, carX + halfW);
    // lit strip
    ctx.fillStyle = `rgba(255,255,210,${0.1 * (1 - t * 0.7)})`;
    ctx.fillRect(litL * PIXEL, y * PIXEL, (litR - litL) * PIXEL, PIXEL);
  }

  // Road texture
  for (let x = 0; x < W; x++) {
    for (let y = roadTop + 1; y < H; y += 4) {
      if (Math.random() < 0.05) {
        ctx.fillStyle = 'rgba(28,28,44,0.5)';
        ctx.fillRect(x * PIXEL, y * PIXEL, PIXEL, PIXEL);
      }
    }
  }

  // Road centre dashes — perspective-converging
  for (let y = roadTop + 2; y < H; y += 6) {
    const t = (y - roadTop) / (H - roadTop);
    const dashW = Math.max(1, Math.floor(t * 4));
    ctx.fillStyle = `rgba(55,55,75,${0.6 + t * 0.3})`;
    ctx.fillRect((carX - Math.floor(dashW/2)) * PIXEL, y * PIXEL, dashW * PIXEL, Math.max(1, Math.floor(t * 2)) * PIXEL);
  }

  // Road edges — converging perspective lines
  ctx.strokeStyle = 'rgba(45,45,65,0.7)';
  ctx.lineWidth = PIXEL;
  // left edge
  ctx.beginPath();
  ctx.moveTo(carX * PIXEL, roadTop * PIXEL);
  ctx.lineTo(Math.floor(W * 0.06) * PIXEL, H * PIXEL);
  ctx.stroke();
  // right edge
  ctx.beginPath();
  ctx.moveTo(carX * PIXEL, roadTop * PIXEL);
  ctx.lineTo(Math.floor(W * 0.94) * PIXEL, H * PIXEL);
  ctx.stroke();
  ctx.lineWidth = 1;

  // === CAR HEADLIGHTS — the focal point source ===
  // Left headlight
  ctx.fillStyle = '#fffef0';
  ctx.fillRect((carX - 3) * PIXEL, carY * PIXEL, 2 * PIXEL, 2 * PIXEL);
  // Right headlight
  ctx.fillRect((carX + 2) * PIXEL, carY * PIXEL, 2 * PIXEL, 2 * PIXEL);
  // Lens bloom
  ctx.fillStyle = 'rgba(255,255,220,0.8)';
  ctx.fillRect((carX - 4) * PIXEL, (carY - 1) * PIXEL, 4 * PIXEL, 4 * PIXEL);
  ctx.fillRect((carX + 1) * PIXEL, (carY - 1) * PIXEL, 4 * PIXEL, 4 * PIXEL);
  // car silhouette
  ctx.fillStyle = '#050508';
  ctx.fillRect((carX - 4) * PIXEL, (carY + 2) * PIXEL, 9 * PIXEL, 3 * PIXEL);
  ctx.fillRect((carX - 3) * PIXEL, (carY - 1) * PIXEL, 7 * PIXEL, 3 * PIXEL);
}

  '.........XX.....',
  '.......XXXX.....',
  '......XXXXXX....',
  '.....XXXXXXX....',
  '....XXXXXXXX....',
  '....XXXXXXX.....',
  '....XXXXX.......',
  '....XX..X.......',
  '....X...X.......',
  '....X...X.......',
  '................',
  '................',
];

function drawDeerSprite(sprite, color = '#c8b898') {
  dCtx.clearRect(0, 0, 32, 32);
  dCtx.fillStyle = color;
  for (let y = 0; y < 16; y++) {
    for (let x = 0; x < 16; x++) {
      if (sprite[y][x] === 'X') {
        dCtx.fillRect(x * 2, y * 2, 2, 2);
      }
    }
  }
}

drawDeerSprite(deerSprite);

// ── DEER ANIMATION ──
const deerEl = document.getElementById('deer');
let deerX = 40;
let deerDir = 1;
let deerPaused = false;
let deerPauseTimer = 0;
let currentScene = null;

function animateDeer() {
  if (currentScene === 'hospital') {
    // Deer faces you and stays still
    deerEl.style.bottom = '18px';
    const targetX = window.innerWidth / 2 - 32;
    deerX += (targetX - deerX) * 0.05;
    deerEl.style.left = deerX + 'px';
    drawDeerSprite(deerSpriteLeft, '#c8b898');
  } else if (currentScene === 'highway') {
    // Deer frozen in headlights
    deerX = window.innerWidth / 2 - 32;
    deerEl.style.left = deerX + 'px';
    deerEl.style.bottom = '42px';
    drawDeerSprite(deerSpriteLeft, '#ffffff');
  } else {
    deerEl.style.bottom = '18px';
    if (!deerPaused) {
      deerX += deerDir * 0.6;
      if (deerX > window.innerWidth + 20) { deerX = -80; }
      if (deerX < -80) { deerX = window.innerWidth + 20; deerDir = 1; }
      if (Math.random() < 0.003) {
        deerPaused = true;
        deerPauseTimer = 80 + Math.floor(Math.random() * 120);
      }
    } else {
      deerPauseTimer--;
      if (deerPauseTimer <= 0) deerPaused = false;
    }
    deerEl.style.left = deerX + 'px';
    drawDeerSprite(deerDir === 1 ? deerSprite : deerSpriteLeft);
  }
  requestAnimationFrame(animateDeer);
}
animateDeer();

// ── SCENE REDRAW LOOP (for flicker) ──
let flickerFrame = 0;
function sceneLoop() {
  flickerFrame++;
  if (flickerFrame % 8 === 0) {
    if (currentScene === 'kitchen' || currentScene === 'hospital') {
      drawScene(currentScene);
    }
  }
  requestAnimationFrame(sceneLoop);
}
sceneLoop();

// ── POEM RENDERING ──
function showPoem(locKey) {
  const data = poems[locKey];
  const panel = document.getElementById('poem-lines');
  const label = document.getElementById('location-label');

  // Clear
  panel.innerHTML = '';
  label.textContent = data.label;
  label.classList.remove('visible');

  // Transition
  const dither = document.getElementById('dither');
  dither.classList.add('flash');
  setTimeout(() => dither.classList.remove('flash'), 350);

  setTimeout(() => label.classList.add('visible'), 300);

  data.lines.forEach((line, i) => {
    const el = document.createElement('span');
    el.classList.add('poem-line');
    if (line.blank) el.classList.add('blank');
    if (line.italic) el.classList.add('italic');
    if (line.indent) el.classList.add('indent');
    el.textContent = line.t || '\u00A0';
    panel.appendChild(el);

    setTimeout(() => el.classList.add('show'), 350 + i * 90);
  });
}

// ── NAV INTERACTION ──
document.querySelectorAll('.loc-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.loc-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const loc = btn.dataset.loc;
    currentScene = loc;
    drawScene(loc);
    showPoem(loc);
  });
});
</script>
